<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600">
<rect width="1120" height="600" fill="#ffffff"/>
<style>
.title { font: 700 22px Segoe UI, Arial, sans-serif; fill: #1f2933; }
.subtitle { font: 13px Segoe UI, Arial, sans-serif; fill: #52616f; }
.label { font: 12px Segoe UI, Arial, sans-serif; fill: #243b53; }
.small { font: 10px Segoe UI, Arial, sans-serif; fill: #52616f; }
.axis { stroke: #9fb3c8; stroke-width: 1; }
.grid { stroke: #e4ebf2; stroke-width: 1; }
.box { fill: #f8fafc; stroke: #b8c7d6; stroke-width: 1.5; rx: 8; }
.box2 { fill: #edf7f6; stroke: #4f9d96; stroke-width: 1.5; rx: 8; }
.box3 { fill: #fff7ed; stroke: #d97706; stroke-width: 1.5; rx: 8; }
.arrow { stroke: #52616f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#52616f"/>
</marker>
</defs>
<text x="36.0" y="38.0" class="title" text-anchor="start">Asymmetric Request-Class Routing Prototype</text>
<text x="36.0" y="62.0" class="subtitle" text-anchor="start">The 1+3 routing variant keeps the 4-GPU budget but shifts capacity toward long/image traffic.</text>
<rect x="48" y="132" width="170" height="92" class="box"/>
<text x="133.0" y="166.0" class="label" text-anchor="middle">Load Tester</text>
<text x="133.0" y="190.0" class="small" text-anchor="middle">120 mixed users</text>
<path d="M218 178 C266 178, 286 178, 326 178" class="arrow"/>
<rect x="326" y="124" width="176" height="108" class="box"/>
<text x="414.0" y="158.0" class="label" text-anchor="middle">Routing Client</text>
<text x="414.0" y="183.0" class="small" text-anchor="middle">text -&gt; r1</text>
<text x="414.0" y="205.0" class="small" text-anchor="middle">long/image -&gt; r3</text>
<path d="M502 152 C560 110, 600 104, 650 104" class="arrow"/>
<path d="M502 204 C560 280, 600 302, 650 302" class="arrow"/>
<rect x="650" y="76" width="384" height="142" class="box2"/>
<text x="842.0" y="110.0" class="label" text-anchor="middle">Text Endpoint</text>
<text x="842.0" y="135.0" class="small" text-anchor="middle">1 H100 replica</text>
<text x="842.0" y="158.0" class="small" text-anchor="middle">1208 text requests</text>
<text x="842.0" y="181.0" class="small" text-anchor="middle">0 text errors</text>
<rect x="650" y="286" width="384" height="162" class="box3"/>
<text x="842.0" y="320.0" class="label" text-anchor="middle">Heavy Endpoint</text>
<text x="842.0" y="345.0" class="small" text-anchor="middle">3 H100 replicas</text>
<text x="842.0" y="368.0" class="small" text-anchor="middle">392 long + 532 image requests</text>
<text x="842.0" y="391.0" class="small" text-anchor="middle">0 long/image errors</text>
<rect x="188" y="502" width="744" height="58" fill="#eefaf7" stroke="#2f9e44" rx="8"/>
<text x="560.0" y="526.0" class="label" text-anchor="middle">Observed result</text>
<text x="560.0" y="548.0" class="small" text-anchor="middle">Score improved to 621,303 versus 235,765 for 2+2 routing, but remained below the monolithic best.</text>
</svg>
